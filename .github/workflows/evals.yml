name: evals

# Layers 1-3 against real models. These cost money, so they are gated:
#   - on a schedule (weekly), or
#   - when a PR carries the `run-evals` label, or
#   - manual dispatch.
# Requires an agent API key provided as a repository secret.

on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  pull_request:
    types: [labeled]
  workflow_dispatch:
    inputs:
      profile:
        description: "Profile to test (plugin|core)"
        default: "plugin"

permissions:
  contents: read

jobs:
  evals:
    # Only run on schedule/dispatch, or when the PR was labeled `run-evals`.
    if: >-
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && github.event.label.name == 'run-evals')
    runs-on: ubuntu-latest
    env:
      # Provide your agent command + key as secrets. The runner contract is in
      # evals/README.md. Without these the job is a no-op (skipped gracefully).
      SKILLS_AGENT_CMD: ${{ secrets.SKILLS_AGENT_CMD }}
      AGENT_API_KEY: ${{ secrets.AGENT_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Guard — require an agent to be configured
        run: |
          if [ -z "${SKILLS_AGENT_CMD:-}" ] || [ -z "${AGENT_API_KEY:-}" ]; then
            echo "::warning::SKILLS_AGENT_CMD / AGENT_API_KEY not configured — skipping model evals."
            echo "SKIP=1" >> "$GITHUB_ENV"
          fi

      - name: Layer 1 — activation evals (real)
        if: env.SKIP != '1'
        run: bash scripts/run-activation-evals.sh

      - name: Layers 2-3 — behavioral + A/B ablation
        if: env.SKIP != '1'
        run: |
          fail=0
          total=0
          for task in evals/tasks/*/; do
            name="$(basename "$task")"
            total=$((total+1))
            echo "::group::A/B $name"
            if ! bash evals/runner/ab.sh "$name"; then fail=$((fail+1)); fi
            echo "::endgroup::"
          done
          echo "A/B tasks: $((total-fail))/$total improved or held."
          # Pass-rate threshold: fail the job if too many tasks regressed.
          threshold=$(( (total + 1) / 2 ))   # at least half must pass
          if [ "$((total-fail))" -lt "$threshold" ]; then
            echo "::error::Eval pass rate below threshold ($((total-fail))/$total)."
            exit 1
          fi
