name: validate

# Cheap, deterministic checks. Runs on every push/PR. No model calls, no secrets.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-skills:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Validate skill structure, budgets and conflicts
        run: bash scripts/validate-skills.sh

      - name: Activation evals (dry mode — file presence + prompt parsing)
        run: bash scripts/run-activation-evals.sh

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Lint shell scripts
        run: |
          mapfile -t files < <(
            find evals/smoke evals/runner scripts evals -maxdepth 1 -name '*.sh' -type f | sort
          )
          shellcheck "${files[@]}"

  grader-golden:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Golden grader tests (no model calls)
        run: bash evals/test-graders.sh

  markdown-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: |
            **/*.md
            !node_modules
